<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Nexus</title>
    <style>
      :root {
        --bg: #fafafa;
        --fg: #171717;
      }
      html[data-theme='dark'] {
        --bg: #0a0a0a;
        --fg: #e5e5e5;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial,
          sans-serif;
        user-select: none;
        -webkit-app-region: drag;
        overflow: hidden;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
      }
      .logo {
        width: 96px;
        height: 96px;
        animation: pulse 2s ease-in-out infinite;
      }
      .name {
        font-size: 22px;
        font-weight: 600;
        letter-spacing: 0.5px;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.55; }
      }
      @media (prefers-reduced-motion: reduce) {
        .logo { animation: none; }
      }
    </style>
  </head>
  <body>
    <svg
      class="logo"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 256 256"
      role="img"
      aria-label="Nexus"
    >
      <defs>
        <linearGradient id="g" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#10b981" />
          <stop offset="1" stop-color="#0f766e" />
        </linearGradient>
      </defs>
      <rect x="0" y="0" width="256" height="256" rx="56" ry="56" fill="url(#g)" />
      <g fill="#ffffff">
        <rect x="70" y="64" width="28" height="128" />
        <rect x="158" y="64" width="28" height="128" />
        <polygon points="70,64 98,64 186,192 158,192" />
      </g>
    </svg>
    <div class="name">Nexus</div>
    <script>
      // Read ?theme=dark|light from the URL to set the right background on first paint.
      try {
        var p = new URLSearchParams(location.search);
        var t = p.get('theme');
        if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      } catch (_) {}
    </script>
  </body>
</html>
