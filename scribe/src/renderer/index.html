<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Dev-floor CSP. Vite HMR + React Fast Refresh need inline/eval scripts and a
      websocket, so this policy is permissive. In production the main process
      injects a strict Content-Security-Policy header (see src/main/index.ts);
      the browser enforces the intersection, so prod is locked down regardless.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' ws: wss:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-src 'none'"
    />
    <title>Scribe</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
