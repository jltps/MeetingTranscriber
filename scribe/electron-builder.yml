# appId stays com.scribe.app — it keys the per-user data dir (DB + encrypted keys).
# Changing it would orphan every existing install's meetings (§1.5). The rename is
# cosmetic only: productName/icon/installer identity below (ROADMAP_V04_09).
appId: com.scribe.app
productName: Nexus
directories:
  output: release
# Keep source/test files out of the package; out/** and production node_modules
# are included by default.
files:
  - '!src/**'
  - '!tests/**'
  - '!e2e/**'
  - '!**/*.map'
# The better-sqlite3 native addon can't be loaded from inside an asar archive.
asarUnpack:
  - '**/*.node'
# Bundle the window icon so the running packaged app shows the Nexus mark
# (the .exe icon itself isn't embedded — signAndEditExecutable is off below).
extraResources:
  - from: build/icon.png
    to: icon.png
  - from: build/splash.html
    to: splash.html
# Native deps are already built for Electron's ABI via .npmrc (runtime=electron),
# so don't let electron-builder rebuild them (this machine has no C++ toolchain).
npmRebuild: false
win:
  target:
    - nsis
  icon: build/icon.ico
  # Stay off — flipping this true triggers electron-builder to download the
  # winCodeSign bundle, whose macOS symlinks can't be extracted on Windows
  # without admin / Developer Mode. We embed the Nexus icon (and product /
  # version metadata) ourselves via build/after-pack.cjs (rcedit), which
  # runs before NSIS bundles the .exe.
  signAndEditExecutable: false
# Embed the Nexus icon on the packaged .exe so it doesn't ship with Electron's
# default icon (visible in File Explorer, Task Manager, pinned taskbar entries).
afterPack: build/after-pack.cjs
# Silent install (V07): required for background auto-updates via electron-updater.
# Tradeoff: first-time installs are also silent (no install-dir picker) — same UX
# as Slack/Discord/VS Code per-user installers. `deleteAppDataOnUninstall: false`
# keeps the user's DB across updates and uninstalls.
nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  deleteAppDataOnUninstall: false
  shortcutName: Nexus
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
# Auto-update feed (V07). GitHub Releases is the source of truth: tag pushes
# produce releases, and electron-updater pulls from them. electron-builder
# writes the correctly-shaped `latest.yml` into `release/` on `pnpm dist`.
publish:
  provider: github
  owner: jltps
  repo: MeetingTranscriber
  releaseType: release
